<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark" style="background:#16213e">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">S.A.P.S</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white-50" sec:authorize="isAuthenticated()" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <span sec:authentication="name">usuario</span>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm" type="submit">Salir</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
