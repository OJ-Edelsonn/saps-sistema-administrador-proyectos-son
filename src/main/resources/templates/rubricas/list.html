<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${moduleTitle})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 fw-bold mb-0" th:text="${moduleTitle}">rubricas</h1>
            <a class="btn btn-primary" th:href="@{/rubricas/nuevo}">Nuevo</a>
        </div>
        <div class="page-card">
            <form class="row g-2 mb-3" method="get">
                <div class="col-sm-10"><input class="form-control" name="q" th:value="${q}" placeholder="Buscar"></div>
                <div class="col-sm-2 d-grid"><button class="btn btn-outline-primary" type="submit">Buscar</button></div>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead><tr><th>ID</th><th>Nombre</th><th>Curso</th><th>Puntaje</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}">ID</td><td th:text="${item.nombre}">Nombre</td><td th:text="${item.curso != null ? item.curso.nombre : '-'}">Curso</td><td th:text="${item.puntajeMaximo}">Puntaje</td><td th:text="${item.estado}">Estado</td>
                        <td class="table-actions">
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/rubricas/{id}/criterios(id=${item.id})}">Criterios</a>
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/rubricas/editar/{id}(id=${item.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-danger" data-confirm="Confirma la eliminacion del registro" th:href="@{/rubricas/eliminar/{id}(id=${item.id})}">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
