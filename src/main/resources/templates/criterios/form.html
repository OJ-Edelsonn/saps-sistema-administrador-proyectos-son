<!DOCTYPE html>
            <html lang="es" xmlns:th="http://www.thymeleaf.org">
            <head th:replace="~{fragments/header :: head(${moduleTitle})}"></head>
            <body>
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            <div class="app-shell">
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
                <main class="content">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h1 class="h3 fw-bold mb-0" th:text="${moduleTitle}">Formulario</h1>
                        <a class="btn btn-outline-secondary" th:href="@{/criterios}">Volver</a>
                    </div>
                    <form class="page-card" th:action="@{/criterios/guardar}" th:object="${item}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Rubrica</label>
                    <select class="form-select" th:field="*{rubrica}">
    <option value="">Seleccione...</option>
    <option th:each="option : ${rubricas}" th:value="${option.id}" th:text="${option.nombre}">Opcion</option>
</select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('rubrica')}" th:errors="*{rubrica}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" type="text" th:field="*{nombre}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Descripcion</label>
                    <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Puntaje maximo</label>
                    <input class="form-control" type="number" step="0.01" th:field="*{puntajeMaximo}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('puntajeMaximo')}" th:errors="*{puntajeMaximo}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Peso porcentual</label>
                    <input class="form-control" type="number" step="0.01" th:field="*{pesoPorcentual}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('pesoPorcentual')}" th:errors="*{pesoPorcentual}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Orden</label>
                    <input class="form-control" type="number" th:field="*{orden}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('orden')}" th:errors="*{orden}"></div>
                </div>

                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Guardar</button>
                            <a class="btn btn-outline-secondary" th:href="@{/criterios}">Cancelar</a>
                        </div>
                    </form>
                    <div th:replace="~{fragments/footer :: footer}"></div>
                </main>
            </div>
            </body>
            </html>
