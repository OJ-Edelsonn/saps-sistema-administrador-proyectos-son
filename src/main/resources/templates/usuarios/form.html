<!DOCTYPE html>
            <html lang="es" xmlns:th="http://www.thymeleaf.org">
            <head th:replace="~{fragments/header :: head(${moduleTitle})}"></head>
            <body>
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            <div class="app-shell">
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
                <main class="content">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h1 class="h3 fw-bold mb-0" th:text="${moduleTitle}">Formulario</h1>
                        <a class="btn btn-outline-secondary" th:href="@{/usuarios}">Volver</a>
                    </div>
                    <form class="page-card" th:action="@{/usuarios/guardar}" th:object="${item}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Usuario</label>
                    <input class="form-control" type="text" th:field="*{username}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contrasena</label>
                    <input class="form-control" type="password" th:field="*{password}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nombre completo</label>
                    <input class="form-control" type="text" th:field="*{nombreCompleto}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('nombreCompleto')}" th:errors="*{nombreCompleto}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input class="form-control" type="email" th:field="*{correo}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Rol</label>
                    <select class="form-select" th:field="*{rol}">
    <option value="">Seleccione...</option>
    <option th:each="option : ${roles}" th:value="${option.id}" th:text="${option.nombre}">Opcion</option>
</select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('rol')}" th:errors="*{rol}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Estado</label>
                    <select class="form-select" th:field="*{estado}">
    <option th:each="option : ${estados}" th:value="${option}" th:text="${option}">Opcion</option>
</select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                </div>

                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Guardar</button>
                            <a class="btn btn-outline-secondary" th:href="@{/usuarios}">Cancelar</a>
                        </div>
                    </form>
                    <div th:replace="~{fragments/footer :: footer}"></div>
                </main>
            </div>
            </body>
            </html>
