<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${moduleTitle})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 fw-bold mb-0" th:text="${moduleTitle}">estudiantes</h1>
            <a class="btn btn-primary" th:href="@{/estudiantes/nuevo}">Nuevo</a>
        </div>
        <div class="page-card">
            <form class="row g-2 mb-3" method="get">
                <div class="col-sm-10"><input class="form-control" name="q" th:value="${q}" placeholder="Buscar"></div>
                <div class="col-sm-2 d-grid"><button class="btn btn-outline-primary" type="submit">Buscar</button></div>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead><tr><th>ID</th><th>Codigo</th><th>Nombres</th><th>Apellidos</th><th>Carrera</th><th>Grupo</th><th>Acciones</th></tr></thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}">ID</td><td th:text="${item.codigoUniversitario}">Codigo</td><td th:text="${item.nombres}">Nombres</td><td th:text="${item.apellidos}">Apellidos</td><td th:text="${item.carrera}">Carrera</td><td th:text="${item.grupo != null ? item.grupo.nombre : '-'}">Grupo</td>
                        <td class="table-actions">

                            <a class="btn btn-sm btn-outline-primary" th:href="@{/estudiantes/editar/{id}(id=${item.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-danger" data-confirm="Confirma la eliminacion del registro" th:href="@{/estudiantes/eliminar/{id}(id=${item.id})}">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
