<!DOCTYPE html>
            <html lang="es" xmlns:th="http://www.thymeleaf.org">
            <head th:replace="~{fragments/header :: head(${moduleTitle})}"></head>
            <body>
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            <div class="app-shell">
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
                <main class="content">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h1 class="h3 fw-bold mb-0" th:text="${moduleTitle}">Formulario</h1>
                        <a class="btn btn-outline-secondary" th:href="@{/cursos}">Volver</a>
                    </div>
                    <form class="page-card" th:action="@{/cursos/guardar}" th:object="${item}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Codigo</label>
                    <input class="form-control" type="text" th:field="*{codigo}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" type="text" th:field="*{nombre}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Ciclo</label>
                    <input class="form-control" type="number" th:field="*{ciclo}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('ciclo')}" th:errors="*{ciclo}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Creditos</label>
                    <input class="form-control" type="number" th:field="*{creditos}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('creditos')}" th:errors="*{creditos}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Descripcion</label>
                    <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Estado</label>
                    <select class="form-select" th:field="*{estado}">
    <option th:each="option : ${estados}" th:value="${option}" th:text="${option}">Opcion</option>
</select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                </div>

                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Guardar</button>
                            <a class="btn btn-outline-secondary" th:href="@{/cursos}">Cancelar</a>
                        </div>
                    </form>
                    <div th:replace="~{fragments/footer :: footer}"></div>
                </main>
            </div>
            </body>
            </html>
